<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Terminal body -->
  <rect x="8" y="12" width="48" height="36" rx="4" fill="#1a1a2e" stroke="#ff6b35" stroke-width="2"/>
  <rect x="8" y="12" width="48" height="8" rx="4" fill="#2a2a3e"/>
  <circle cx="15" cy="16" r="2" fill="#e74c3c"/>
  <circle cx="22" cy="16" r="2" fill="#ffd700"/>
  <circle cx="29" cy="16" r="2" fill="#00ff88"/>
  <!-- Prompt line -->
  <text x="14" y="32" font-family="monospace" font-size="6" fill="#00ff88">$_</text>
  <!-- Creature peeking out (Embercli) -->
  <g transform="translate(36,28)">
    <!-- Body -->
    <rect x="0" y="4" width="16" height="12" rx="3" fill="#ff6b35"/>
    <!-- Eyes -->
    <rect x="3" y="7" width="3" height="3" rx="1" fill="#fff"/>
    <rect x="10" y="7" width="3" height="3" rx="1" fill="#fff"/>
    <rect x="4" y="8" width="1.5" height="1.5" fill="#0a0a1a"/>
    <rect x="11" y="8" width="1.5" height="1.5" fill="#0a0a1a"/>
    <!-- Flame on head -->
    <path d="M8 4 L6 0 L8 2 L10 -1 L9 3 L11 1 L10 4Z" fill="#ffd700"/>
    <path d="M7 4 L6 1 L8 3 L10 0 L9 3Z" fill="#ff6b35" opacity="0.7"/>
  </g>
  <!-- Pixel decoration -->
  <rect x="14" y="38" width="2" height="2" fill="#ff6b35" opacity="0.5"/>
  <rect x="18" y="40" width="2" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="22" y="38" width="2" height="2" fill="#00bfff" opacity="0.5"/>
</svg>